<script>
(function() {
  var carousel = document.getElementById('homeCarousel');
  if (!carousel) return;
  var slides = carousel.querySelectorAll('.carousel-slide');
  var dots = carousel.querySelectorAll('.carousel-dot');
  var prevBtn = carousel.querySelector('.carousel-prev');
  var nextBtn = carousel.querySelector('.carousel-next');
  var current = 0;
  var timer = null;
  function goTo(index) {
    slides[current].classList.remove('active');
    dots[current].classList.remove('active');
    current = (index + slides.length) % slides.length;
    slides[current].classList.add('active');
    dots[current].classList.add('active');
  }
  function next() { goTo(current + 1); }
  function prev() { goTo(current - 1); }
  function startAuto() { stopAuto(); timer = setInterval(next, 4000); }
  function stopAuto() { if (timer) { clearInterval(timer); timer = null; } }
  prevBtn.addEventListener('click', function(e) { e.preventDefault(); e.stopPropagation(); prev(); startAuto(); });
  nextBtn.addEventListener('click', function(e) { e.preventDefault(); e.stopPropagation(); next(); startAuto(); });
  for (var i = 0; i < dots.length; i++) {
    (function(idx) {
      dots[idx].addEventListener('click', function(e) { e.preventDefault(); e.stopPropagation(); goTo(idx); startAuto(); });
    })(i);
  }
  carousel.addEventListener('mouseenter', stopAuto);
  carousel.addEventListener('mouseleave', startAuto);
   
  var touchStartX = 0, touchStartY = 0, touchEndX = 0, isSwiping = false;
  carousel.addEventListener('touchstart', function(e) {
    touchStartX = e.changedTouches[0].clientX;
    touchStartY = e.changedTouches[0].clientY;
    isSwiping = false;
    stopAuto();
  }, { passive: true });
  carousel.addEventListener('touchmove', function(e) {
    touchEndX = e.changedTouches[0].clientX;
    var dx = Math.abs(touchEndX - touchStartX);
    var dy = Math.abs(e.changedTouches[0].clientY - touchStartY);
    if (dx > 10 && dx > dy) isSwiping = true;
  }, { passive: true });
  carousel.addEventListener('touchend', function(e) {
    if (!isSwiping) { startAuto(); return; }
    var diff = touchStartX - e.changedTouches[0].clientX;
    if (Math.abs(diff) > 40) {
      if (diff > 0) next(); else prev();
    }
    startAuto();
  }, { passive: true });
  startAuto();
})();
</script>
