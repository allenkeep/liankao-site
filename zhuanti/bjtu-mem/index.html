<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>招生专题</title>
<style>
:root{--primary:#1a3a5c;--primary-light:#2a5a8c;--primary-dark:#0f2440;--accent:#c8102e;--accent-hover:#a00d24;--text:#333;--text-light:#666;--text-white:#fff;--bg:#fff;--bg-light:#f7f8fa;--bg-dark:var(--primary);--border:#e0e0e0;--radius:8px;--shadow:0 2px 12px rgba(0,0,0,.08);--shadow-lg:0 8px 32px rgba(0,0,0,.12);--max-width:1400px;--section-pad:80px;--transition:.3s ease}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;font-size:16px}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;color:var(--text);background:var(--bg);line-height:1.7;-webkit-font-smoothing:antialiased}
a{color:inherit;text-decoration:none;transition:color var(--transition)}
a:hover{color:var(--accent)}
img{max-width:100%;height:auto;display:block}
ul{list-style:none}
.container{max-width:var(--max-width);margin:0 auto;padding:0 40px}
.section{padding:var(--section-pad) 0}
.section-dark{background:var(--bg-dark);color:var(--text-white)}
.section-light{background:var(--bg-light)}
.section-header{text-align:center;margin-bottom:60px}
.section-header h2{font-size:36px;font-weight:700;margin-bottom:8px;letter-spacing:2px}
.section-header .en{font-size:14px;text-transform:uppercase;letter-spacing:3px;opacity:.5;font-weight:300}
.section-header .line{width:60px;height:3px;background:var(--accent);margin:16px auto 0;border-radius:2px}
.section-dark .section-header .line{background:rgba(255,255,255,.5)}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:14px 36px;border-radius:var(--radius);font-size:16px;font-weight:600;cursor:pointer;transition:all var(--transition);border:none;gap:8px}
.btn-primary{background:var(--accent);color:var(--text-white)}
.btn-primary:hover{background:var(--accent-hover);color:var(--text-white);transform:translateY(-2px);box-shadow:0 6px 20px rgba(200,16,46,.35)}
.btn-outline{background:transparent;color:var(--text-white);border:2px solid rgba(255,255,255,.6)}
.btn-outline:hover{background:var(--text-white);color:var(--primary);border-color:var(--text-white)}
.btn-dark{background:var(--primary);color:var(--text-white)}
.btn-dark:hover{background:var(--primary-light);color:var(--text-white)}
.nav{position:fixed;top:0;left:0;right:0;z-index:1000;background:transparent;transition:all var(--transition)}
.nav.scrolled{background:rgba(15,36,64,.96);backdrop-filter:blur(12px);box-shadow:0 2px 20px rgba(0,0,0,.15)}
.nav-inner{max-width:var(--max-width);margin:0 auto;padding:0 40px;display:flex;align-items:center;justify-content:space-between;height:70px}
.nav-logo{display:flex;align-items:center;gap:12px;color:var(--text-white);font-size:20px;font-weight:700;letter-spacing:1px}
.nav-logo img{height:36px}
.nav-links{display:flex;gap:32px}
.nav-links a{color:rgba(255,255,255,.8);font-size:15px;font-weight:500;position:relative;padding:4px 0}
.nav-links a:hover,.nav-links a.active{color:var(--text-white)}
.nav-links a::after{content:'';position:absolute;bottom:-2px;left:0;width:0;height:2px;background:var(--accent);transition:width var(--transition)}
.nav-links a:hover::after,.nav-links a.active::after{width:100%}
.nav-mobile-btn{display:none;background:none;border:none;color:var(--text-white);font-size:24px;cursor:pointer}
.hero{position:relative;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;background:linear-gradient(135deg,var(--primary-dark) 0%,var(--primary) 50%,var(--primary-light) 100%)}
.hero-carousel{position:absolute;inset:0;z-index:0}
.hero-carousel .slide{position:absolute;inset:0;opacity:0;transition:opacity 1.2s ease}
.hero-carousel .slide.active{opacity:1}
.hero-carousel .slide img{width:100%;height:100%;object-fit:cover}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(135deg,rgba(15,36,64,.88) 0%,rgba(26,58,92,.7) 100%);z-index:1}
.hero-particles{position:absolute;inset:0;z-index:1;overflow:hidden}
.hero-particles .particle{position:absolute;width:4px;height:4px;background:rgba(255,255,255,.3);border-radius:50%;animation:float linear infinite}
@keyframes float{0%{transform:translateY(100vh) rotate(0deg);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-100px) rotate(720deg);opacity:0}}
.hero-content{position:relative;z-index:2;text-align:center;color:var(--text-white);max-width:860px;padding:0 40px}
.hero-badge{display:inline-block;background:var(--accent);color:var(--text-white);padding:8px 24px;border-radius:24px;font-size:14px;font-weight:600;margin-bottom:28px;letter-spacing:1px}
.hero h1{font-size:58px;font-weight:800;line-height:1.2;margin-bottom:24px;letter-spacing:2px;white-space:pre-line}
.hero .subtitle{font-size:20px;font-weight:300;opacity:.9;margin-bottom:44px;line-height:1.8}
.hero-ctas{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.hero-scroll{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);z-index:2;color:rgba(255,255,255,.6);font-size:13px;text-align:center;animation:bounce 2s infinite}
.hero-scroll .arrow{display:block;margin:8px auto 0;width:20px;height:20px;border-right:2px solid rgba(255,255,255,.4);border-bottom:2px solid rgba(255,255,255,.4);transform:rotate(45deg)}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(8px)}}
.overview-grid{display:grid;grid-template-columns:1.2fr 1fr;gap:60px;align-items:start}
.overview-text h3{font-size:22px;color:var(--primary);margin-bottom:24px;font-weight:700}
.overview-text p{font-size:16px;color:var(--text-light);line-height:2;margin-bottom:16px}
.overview-image{border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow-lg);position:sticky;top:100px}
.overview-image img{width:100%;height:420px;object-fit:cover}
.overview-highlights{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;margin-top:48px}
.highlight-card{background:var(--bg-light);border-radius:var(--radius);padding:28px 20px;text-align:center;transition:all var(--transition);border:1px solid transparent}
.highlight-card:hover{transform:translateY(-4px);box-shadow:var(--shadow);border-color:var(--accent)}
.highlight-card .num{font-size:36px;font-weight:800;color:var(--accent);line-height:1}
.highlight-card .label{font-size:14px;color:var(--text-light);margin-top:10px}
.directions-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:24px}
.direction-card{background:var(--bg);border-radius:var(--radius);padding:36px;box-shadow:var(--shadow);transition:all var(--transition);border-left:4px solid var(--accent)}
.direction-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.direction-card .icon{font-size:36px;margin-bottom:16px}
.direction-card h4{font-size:20px;font-weight:700;color:var(--primary);margin-bottom:4px}
.direction-card h4 span{display:block;font-size:12px;color:var(--text-light);font-weight:400;text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.direction-card p{font-size:15px;color:var(--text-light);line-height:1.8;margin-top:12px}
.admission-grid{display:grid;grid-template-columns:1fr 1fr;gap:60px}
.admission-tabs{display:flex;gap:0;margin-bottom:32px;border-bottom:2px solid rgba(255,255,255,.15)}
.admission-tab{padding:12px 28px;font-size:15px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;margin-bottom:-2px;color:rgba(255,255,255,.5);transition:all var(--transition)}
.admission-tab.active{color:var(--text-white);border-bottom-color:var(--accent)}
.admission-tab:hover{color:var(--text-white)}
.admission-panel{display:none}
.admission-panel.active{display:block}
.admission-item{display:flex;align-items:flex-start;gap:16px;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.08)}
.admission-item:last-child{border-bottom:none}
.admission-date{font-size:13px;color:rgba(255,255,255,.5);white-space:nowrap;min-width:80px}
.admission-item a{font-size:15px;color:rgba(255,255,255,.85)}
.admission-item a:hover{color:var(--text-white)}
.admission-info-cards{display:flex;flex-direction:column;gap:20px}
.info-card{background:rgba(255,255,255,.06);border-radius:var(--radius);padding:24px;border:1px solid rgba(255,255,255,.08)}
.info-card h4{font-size:16px;font-weight:700;margin-bottom:12px;color:var(--text-white);display:flex;align-items:center;gap:8px}
.info-card li{font-size:14px;color:rgba(255,255,255,.7);line-height:2;padding-left:16px;position:relative}
.info-card li::before{content:'•';position:absolute;left:0;color:var(--accent)}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:24px}
.stat-card{background:var(--bg);border-radius:var(--radius);padding:32px;box-shadow:var(--shadow);transition:all var(--transition);text-align:center}
.stat-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.stat-card .icon{font-size:40px;margin-bottom:16px}
.stat-card h4{font-size:18px;font-weight:700;color:var(--primary);margin-bottom:8px}
.stat-card p{font-size:14px;color:var(--text-light);line-height:1.6}
.training-philosophy{display:flex;gap:32px;margin-bottom:60px;flex-wrap:wrap;justify-content:center}
.philosophy-item{flex:1;min-width:180px;max-width:220px;text-align:center;padding:24px;background:var(--bg-light);border-radius:var(--radius)}
.philosophy-item .letter{font-size:52px;font-weight:800;color:var(--accent);line-height:1}
.philosophy-item .word{font-size:18px;font-weight:700;color:var(--primary);margin:8px 0 4px}
.philosophy-item .desc{font-size:13px;color:var(--text-light)}
.training-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px}
.training-card{background:var(--bg);border-radius:var(--radius);padding:28px;box-shadow:var(--shadow);transition:all var(--transition);position:relative;overflow:hidden}
.training-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.training-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:var(--accent)}
.training-card .icon{font-size:32px;margin-bottom:12px}
.training-card h4{font-size:18px;font-weight:700;color:var(--primary);margin-bottom:4px}
.training-card h4 span{display:block;font-size:12px;color:var(--text-light);font-weight:400;text-transform:uppercase;letter-spacing:1px;margin-top:2px}
.training-card p{font-size:14px;color:var(--text-light);line-height:1.8;margin-top:8px}
.alumni-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:24px}
.alumni-card{background:var(--bg);border-radius:var(--radius);overflow:hidden;box-shadow:var(--shadow);transition:transform var(--transition)}
.alumni-card:hover{transform:translateY(-4px);box-shadow:var(--shadow-lg)}
.alumni-card .photo{width:100%;height:300px;object-fit:cover}
.alumni-card .info{padding:20px}
.alumni-card .name{font-size:20px;font-weight:700;color:var(--primary)}
.alumni-card .role{font-size:14px;color:var(--text-light);margin-top:4px}
.alumni-card .quote{font-size:14px;color:var(--text);margin-top:12px;line-height:1.6;font-style:italic}
.contact-grid{display:grid;grid-template-columns:1.2fr .8fr;gap:60px;align-items:start}
.contact-departments{display:flex;flex-direction:column;gap:20px}
.contact-dept{padding:24px;background:rgba(255,255,255,.06);border-radius:var(--radius);border:1px solid rgba(255,255,255,.08)}
.contact-dept h4{font-size:16px;font-weight:700;margin-bottom:12px;color:var(--text-white)}
.contact-dept p{font-size:14px;line-height:2;color:rgba(255,255,255,.7)}
.contact-qr{text-align:center;padding:32px;background:rgba(255,255,255,.06);border-radius:var(--radius)}
.contact-qr img{width:200px;height:200px;border-radius:var(--radius);margin:0 auto 16px}
.contact-qr .name{font-size:15px;font-weight:600}
.footer{background:var(--primary-dark);color:rgba(255,255,255,.4);padding:32px 40px;text-align:center;font-size:13px}
.footer a{color:rgba(255,255,255,.6)}
@media(max-width:1024px){
:root{--section-pad:64px}
.container{padding:0 24px}
.hero h1{font-size:42px}
.overview-grid,.admission-grid,.contact-grid{grid-template-columns:1fr;gap:40px}
.directions-grid{grid-template-columns:1fr}
.stats-grid{grid-template-columns:repeat(2,1fr)}
.nav-links{display:none}
.nav-mobile-btn{display:block}
.nav-links.open{display:flex;flex-direction:column;position:absolute;top:70px;left:0;right:0;background:rgba(15,36,64,.98);padding:20px 40px;gap:16px}
}
@media(max-width:768px){
:root{--section-pad:48px}
.container{padding:0 16px}
.hero h1{font-size:32px;white-space:normal}
.hero .subtitle{font-size:16px}
.section-header h2{font-size:28px}
.stats-grid{grid-template-columns:1fr}
.overview-highlights{grid-template-columns:repeat(2,1fr)}
.training-grid{grid-template-columns:1fr}
.alumni-grid{grid-template-columns:1fr}
.admission-tabs{flex-wrap:wrap;gap:4px}
.admission-tab{padding:10px 16px;font-size:14px}
.hero-ctas{flex-direction:column;align-items:center}
.hero-ctas .btn{width:100%;max-width:280px}
.training-philosophy{gap:16px}
.philosophy-item{min-width:140px}
}
.fade-in{opacity:0;transform:translateY(24px);transition:all .6s ease}
.fade-in.visible{opacity:1;transform:translateY(0)}
</style>
</head>

function applyTheme(d){if(!d.theme)return;const r=document.documentElement.style;if(d.theme.primary)r.setProperty('--primary',d.theme.primary);if(d.theme.primaryLight)r.setProperty('--primary-light',d.theme.primaryLight);if(d.theme.primaryDark)r.setProperty('--primary-dark',d.theme.primaryDark);if(d.theme.accent)r.setProperty('--accent',d.theme.accent);if(d.theme.accentHover)r.setProperty('--accent-hover',d.theme.accentHover)}
function renderNav(d){const logo=document.getElementById('navLogo');logo.innerHTML=d.meta.logo?`<img src="${d.meta.logo}" alt=""> ${d.meta.program||d.meta.school}`:(d.meta.program||d.meta.school);const secs=[['overview','项目概况'],['directions','研究方向'],['admission','招生信息'],['stats','项目优势'],['training','培养特色'],['alumni','校友风采'],['contact','联系我们']];const links=document.getElementById('navLinks');links.innerHTML=secs.filter(([s])=>d[s]).map(([s,l])=>`<a href="#${s}">${l}</a>`).join('');document.getElementById('navMobileBtn').addEventListener('click',()=>links.classList.toggle('open'));window.addEventListener('scroll',()=>document.getElementById('nav').classList.toggle('scrolled',window.scrollY>60))}
function renderHero(d){const h=d.hero||{};document.getElementById('heroBadge').textContent=h.badge||'';document.getElementById('heroTitle').textContent=h.title||'';document.getElementById('heroSubtitle').textContent=h.subtitle||'';const ctas=document.getElementById('heroCtas');if(h.ctas)ctas.innerHTML=h.ctas.map(c=>`<a class="btn ${c.style||'btn-primary'}" href="${c.url}">${c.text}</a>`).join('');const carousel=document.getElementById('heroCarousel');if(h.images&&h.images.length>0){carousel.innerHTML=h.images.map((img,i)=>`<div class="slide ${i===0?'active':''}"><img src="${img}" alt=""></div>`).join('');let cur=0;const slides=carousel.querySelectorAll('.slide');setInterval(()=>{slides[cur].classList.remove('active');cur=(cur+1)%slides.length;slides[cur].classList.add('active')},5000);document.getElementById('heroScroll').style.display='none'}const particles=document.getElementById('heroParticles');for(let i=0;i<30;i++){const p=document.createElement('div');p.className='particle';p.style.left=Math.random()*100+'%';p.style.animationDuration=(8+Math.random()*12)+'s';p.style.animationDelay=Math.random()*8+'s';p.style.width=p.style.height=(2+Math.random()*4)+'px';particles.appendChild(p)}}
function renderOverview(d){if(!d.overview)return;document.getElementById('overview').style.display='';const o=d.overview;document.getElementById('overviewTitle').textContent=o.title||'项目概况';document.getElementById('overviewEn').textContent=o.titleEn||'Program Overview';if(o.description)document.getElementById('overviewDesc').innerHTML=o.description.split('\n').map(p=>`<p>${p}</p>`).join('');if(o.link)document.getElementById('overviewLink').innerHTML=`<a class="btn btn-dark" href="${o.link.url}" target="_blank">${o.link.text||'了解更多'}</a>`;if(o.image){const el=document.getElementById('overviewImage');el.innerHTML=`<img src="${o.image}" alt="">`;el.style.display=''}if(o.highlights)document.getElementById('overviewHighlights').innerHTML=o.highlights.map(h=>`<div class="highlight-card fade-in"><div class="num">${h.value}</div><div class="label">${h.label}</div></div>`).join('')}
function renderDirections(d){if(!d.directions||!d.directions.items)return;document.getElementById('directions').style.display='';document.getElementById('directionsTitle').textContent=d.directions.title||'研究方向';document.getElementById('directionsEn').textContent=d.directions.titleEn||'Research Directions';document.getElementById('directionsGrid').innerHTML=d.directions.items.map(i=>`<div class="direction-card fade-in"><div class="icon">${i.icon||'📘'}</div><h4>${i.name}${i.nameEn?`<span>${i.nameEn}</span>`:''}</h4><p>${i.desc||''}</p></div>`).join('')}
function renderAdmission(d){if(!d.admission)return;document.getElementById('admission').style.display='';const a=d.admission;document.getElementById('admissionTitle').textContent=a.title||'招生信息';document.getElementById('admissionEn').textContent=a.titleEn||'Admission';const tabData=[];if(a.notices&&a.notices.length)tabData.push({key:'notices',label:'招生通知',items:a.notices});if(a.activities&&a.activities.length)tabData.push({key:'activities',label:'招生活动',items:a.activities});if(a.brochures&&a.brochures.length)tabData.push({key:'brochures',label:'简章下载',items:a.brochures});const tabs=document.getElementById('admissionTabs'),panels=document.getElementById('admissionPanels');if(tabData.length>0){tabs.innerHTML=tabData.map((t,i)=>`<div class="admission-tab ${i===0?'active':''}" data-tab="${t.key}">${t.label}</div>`).join('');panels.innerHTML=tabData.map((t,i)=>`<div class="admission-panel ${i===0?'active':''}" data-panel="${t.key}">${t.items.map(item=>`<div class="admission-item"><span class="admission-date">${item.date||''}</span><a href="${item.url||'#'}" target="_blank">${item.title}</a></div>`).join('')}</div>`).join('');tabs.querySelectorAll('.admission-tab').forEach(tab=>{tab.addEventListener('click',()=>{tabs.querySelectorAll('.admission-tab').forEach(t=>t.classList.remove('active'));panels.querySelectorAll('.admission-panel').forEach(p=>p.classList.remove('active'));tab.classList.add('active');panels.querySelector(`[data-panel="${tab.dataset.tab}"]`).classList.add('active')})})}else{tabs.style.display='none'}const cards=document.getElementById('admissionInfoCards');let html='';if(a.requirements)html+=`<div class="info-card"><h4>📋 ${a.requirements.title}</h4><ul>${a.requirements.items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;if(a.exam)html+=`<div class="info-card"><h4>📝 ${a.exam.title}</h4><ul>${a.exam.items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;if(a.certificate)html+=`<div class="info-card"><h4>🎓 ${a.certificate.title}</h4><ul>${a.certificate.items.map(i=>`<li>${i}</li>`).join('')}</ul></div>`;if(a.applyUrl)html+=`<a class="btn btn-primary" href="${a.applyUrl}" target="_blank" style="margin-top:8px;width:100%">📝 在线申请</a>`;if(a.hotline)html+=`<a class="btn btn-outline" href="tel:${a.hotline.replace(/\s/g,'')}" style="margin-top:8px;width:100%">📞 ${a.hotline}</a>`;cards.innerHTML=html}
function renderStats(d){if(!d.stats||!d.stats.items)return;document.getElementById('stats').style.display='';document.getElementById('statsTitle').textContent=d.stats.title||'项目优势';document.getElementById('statsEn').textContent=d.stats.titleEn||'Why Choose Us';document.getElementById('statsGrid').innerHTML=d.stats.items.map(s=>`<div class="stat-card fade-in"><div class="icon">${s.icon||'⭐'}</div><h4>${s.title}</h4><p>${s.desc}</p></div>`).join('')}
function renderTraining(d){if(!d.training)return;document.getElementById('training').style.display='';document.getElementById('trainingTitle').textContent=d.training.title||'培养特色';document.getElementById('trainingEn').textContent=d.training.titleEn||'Program Features';if(d.training.philosophy)document.getElementById('trainingPhilosophy').innerHTML=d.training.philosophy.map(p=>`<div class="philosophy-item"><div class="letter">${p.letter}</div><div class="word">${p.word}</div><div class="desc">${p.desc}</div></div>`).join('');if(d.training.programs)document.getElementById('trainingGrid').innerHTML=d.training.programs.map(p=>`<div class="training-card fade-in"><div class="icon">${p.icon||'🎓'}</div><h4>${p.name}${p.nameEn?`<span>${p.nameEn}</span>`:''}</h4><p>${p.desc||''}</p></div>`).join('')}
function renderAlumni(d){if(!d.alumni||!d.alumni.length)return;document.getElementById('alumni').style.display='';document.getElementById('alumniTitle').textContent=d.alumniTitle||'校友风采';document.getElementById('alumniEn').textContent=d.alumniTitleEn||'Alumni Stories';document.getElementById('alumniGrid').innerHTML=d.alumni.map(a=>`<div class="alumni-card fade-in">${a.photo?`<img class="photo" src="${a.photo}" alt="${a.name}">`:''}<div class="info"><div class="name">${a.name}</div><div class="role">${a.role||''}</div>${a.quote?`<div class="quote">"${a.quote}"</div>`:''}</div></div>`).join('')}
function renderContact(d){if(!d.contact)return;document.getElementById('contact').style.display='';document.getElementById('contactTitle').textContent=d.contact.title||'联系我们';document.getElementById('contactEn').textContent=d.contact.titleEn||'Contact Us';document.getElementById('contactDepts').innerHTML=(d.contact.departments||[]).map(dept=>`<div class="contact-dept"><h4>${dept.name}</h4><p>${dept.address?`📍 ${dept.address}<br>`:''}${dept.phone?`📞 ${dept.phone}<br>`:''}${dept.email?`✉️ ${dept.email}`:''}${dept.url?`<br>🌐 <a href="${dept.url}" target="_blank" style="color:rgba(255,255,255,.8)">${dept.url}</a>`:''}</p></div>`).join('');if(d.contact.wechatQr||d.contact.wechatName){const qr=document.getElementById('contactQr');qr.style.display='';qr.innerHTML=`${d.contact.wechatQr?`<img src="${d.contact.wechatQr}" alt="微信二维码">`:''}<div class="name">微信公众号：${d.contact.wechatName||''}</div>`}}
function renderFooter(d){document.getElementById('footer').innerHTML=`© ${new Date().getFullYear()} ${d.meta.school||''} ${d.meta.program||''} ${d.meta.siteUrl?`| <a href="${d.meta.siteUrl}" target="_blank">${d.meta.siteUrl}</a>`:''}`}
function initScrollAnimations(){const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting)e.target.classList.add('visible')})},{threshold:.1});document.querySelectorAll('.fade-in').forEach(el=>obs.observe(el))}
function init(){const d=PAGE_DATA;applyTheme(d);renderNav(d);renderHero(d);renderOverview(d);renderDirections(d);renderAdmission(d);renderStats(d);renderTraining(d);renderAlumni(d);renderContact(d);renderFooter(d);setTimeout(initScrollAnimations,200)}
document.addEventListener('DOMContentLoaded',init);
</script>
