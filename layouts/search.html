{{- define "main" }}

<header class="page-header">
    <h1>{{- (printf "%s&nbsp;" .Title ) | htmlUnescape -}}
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        </svg>
    </h1>
</header>

<div id="searchbox" class="searchbox">
    <div class="search-input-wrap">
        <input id="searchInput" disabled placeholder="{{ .Params.placeholder | default (printf "%s ↵" .Title) }}"
            aria-label="search" type="search" autocomplete="off" maxlength="64">
        <span class="search-enter-hint">Enter ↵</span>
    </div>
    <ul id="searchResults" class="searchResults" aria-label="search results"></ul>
    <div id="searchLoading" class="search-loading" style="display:none;">
        <div class="search-spinner"></div>
        <span>搜索中…</span>
    </div>
    <div id="searchExpandHint" class="search-expand-hint" style="display:none;">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
        <span>按 <kbd>Enter</kbd> 查看更多结果</span>
    </div>
    <div id="searchEmpty" class="search-empty" style="display:none;">
        <p class="search-empty-text">未找到相关内容</p>
        <a id="searchExternal" class="search-external-link" href="#" target="_blank" rel="noopener noreferrer">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line></svg>
            在搜索引擎中搜索
        </a>
    </div>
    <div class="search-suggestions" id="searchSuggestions">
        <span class="search-suggestions-label">热门搜索：</span>
        {{- range site.Params.searchSuggestions }}
        <a class="search-suggestion-tag" href="javascript:void(0)" onclick="document.getElementById('searchInput').value='{{ .term }}';document.getElementById('searchInput').dispatchEvent(new Event('input'))">{{ .term }}</a>
        {{- end }}
    </div>
</div>

{{- end }}{{/* end main */}}
