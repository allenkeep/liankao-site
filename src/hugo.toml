# minify配置
[minify]
  disableHTML = true
  disableCSS = false
  disableJS = false
  disableXML = false
  minifyOutput = true

# 图片配置
[imaging]
  resampleFilter = "Lanczos"
  quality = 85
  anchor = "smart"

# 标记配置
[markup]
  [markup.tableOfContents]
    endLevel = 3
    ordered = false
    startLevel = 2
  [markup.highlight]
    codeFences = true
    guessSyntax = true
    lineNos = true
    noClasses = false
  [markup.goldmark]
    [markup.goldmark.renderer]
      hardWraps = false
      unsafe = true
      xhtml = false

# 相关文章推荐配置
[related]
  includeNewer = true
  threshold = 60
  toLower = true

  [[related.indices]]
    name = "tags"
    weight = 80

  [[related.indices]]
    name = "categories"
    weight = 60

  [[related.indices]]
    name = "date"
    weight = 10

# 输出配置
[outputs]
  home = ["HTML", "RSS", "JSON"]

[outputFormats.JSON]
  mediaType = "application/json"
  baseName = "index"
  isPlainText = true

