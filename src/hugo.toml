# 联考网 Hugo站点配置文件

baseURL = "https://liankao.org.cn/"
languageCode = "zh-CN"
defaultContentLanguage = "zh"
title = "果芽-MBA联考及合作办学硕士报名与辅导"
description = "在职考研一站式信息平台"
copyright = "Copyright © 2024 果芽MBA All Rights Reserved"
theme = "PaperMod"

# 启用功能
enableRobotsTXT = true
enableSitemap = true
enableRSS = true

# 构建配置
buildDrafts = false
buildExpired = false
buildFuture = true

# 语法高亮
pygmentsCodeFences = true
pygmentsUseClasses = true

# 解析配置
summaryLength = 70
timeout = "120s"

# sitemap配置
[sitemap]
  changefreq = "daily"
  filename = "sitemap.xml"
  priority = 0.5

# 参数配置
[params]
  # SEO配置
  description = "在职考研一站式信息平台，提供管理类联考和中外合作办学硕士的最新招生动态、政策解读、院校对比和备考攻略"

  # 导航栏品牌
  [params.label]
    text = ""
    icon = "/img/logo.png"
    iconHeight = 28

  # 日期格式
  dateFormat = "2006-01-02"

  # RSS配置
  rssFullContent = true

  # 暗色模式配置
  defaultTheme = "auto"
  enableThemeToggle = true

  # 显示配置
  ShowBreadCrumbs = true
  ShowReadingTime = true
  ShowWordCount = true
  ShowToc = true
  ShowPostNavLinks = true
  ShowCodeCopyButtons = true

  # 搜索配置
  [params.fuseOpts]
    isCaseSensitive = false
    shouldSort = true
    location = 0
    distance = 1000
    threshold = 0.4
    minMatchCharLength = 1
    keys = ["title", "permalink", "summary", "content"]

  # 社交链接
  [[params.socialIcons]]
    icon = "github"
    title = "GitHub"
    url = ""

  [[params.socialIcons]]
    icon = "wechat"
    title = "微信公众号"
    url = "#"

  # 广告位配置
  [params.ads]
    [params.ads.homeBanner]
      enabled = true
    [params.ads.bannerTop]
      enabled = true
      text = "🔥 添加微信，免费获取MBA/MEM/MPA选校匹配分析"
    [params.ads.bannerBottom]
      enabled = true
      text = "💡 1对1咨询：院校对比、备考规划、政策解读"
    [params.ads.sidebarCard]
      enabled = true
      name = "果芽MBA"
      desc = "在职考研一站式服务"
      logo = "/img/logo.png"
    [params.ads.listCard]
      enabled = true

  # 轮播图配置
  [[params.carouselSlides]]
    image = "/img/carousel/slide1.jpg?v=26"
    alt = "长江商学院MBA"
    url = "https://www.ckgsb.edu.cn/mba"

  [[params.carouselSlides]]
    image = "/img/carousel/slide2.jpg?v=14"
    alt = "中国人民大学商学院EMBA"
    url = "https://emba.rmbs.ruc.edu.cn/"

  [[params.carouselSlides]]
    image = "/img/carousel/slide3.jpg?v=8"
    alt = "北京交通大学MEM"
    url = "https://sem.bjtu.edu.cn/me"

  # 公众号头条
  [[params.wxHeadline]]
    title = "划重点！无需笔试的中外合作硕士一定要知道，完整攻略来啦"
    url = "https://mp.weixin.qq.com/s/8od9BcLGxzky-SMKv-GVLg"
    date = "2026-06-09"
    tag = "中外合作"

  [[params.wxHeadline]]
    title = "倒计时201天！管理类联考6-12月各科拆解，数学背这些……"
    url = "https://mp.weixin.qq.com/s/onJu5KwrUpDx4mzgHWALcw"
    date = "2026-06-05"
    tag = "备考"

  [[params.wxHeadline]]
    title = "蹲！MBA学费真的会降价？！2027级同学一定要关注"
    url = "https://mp.weixin.qq.com/s/j-jS8LRmk82R2LdACvDqCg"
    date = "2026-06-03"
    tag = "MBA学费"

  [[params.wxHeadline]]
    title = "管理类联考3大变数：限报、内卷、有坑"
    url = "https://mp.weixin.qq.com/s/-W0oEN924xZnuKxyHEsJNw"
    date = "2026-06-01"
    tag = "政策"

  [[params.wxHeadline]]
    title = "这10个MBA已不具备保底价值！"
